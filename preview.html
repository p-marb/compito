<!DOCTYPE html>
<html lang="en" data-webtui-theme="gruvbox-dark-hard">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>compito</title>

  <style>
    @import "https://cdn.jsdelivr.net/npm/@webtui/css@latest/dist/full.css";
    @import "https://cdn.jsdelivr.net/npm/@webtui/theme-gruvbox@latest/dist/index.css";
    @import "https://cdn.jsdelivr.net/npm/@webtui/theme-nord@latest/dist/index.css";
    @import "https://cdn.jsdelivr.net/npm/@webtui/theme-catppuccin@latest/dist/index.css";
    @import "https://cdn.jsdelivr.net/npm/@webtui/theme-everforest@latest/dist/index.css";
    @import "https://cdn.jsdelivr.net/npm/@webtui/theme-osmium@latest/dist/index.css";
    @import "https://cdn.jsdelivr.net/npm/@webtui/theme-vitesse@latest/dist/index.css";

    :root {
      --font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --gap: 12px;
      --pad: 12px;
      --danger: #fb4934;
      --warn: #fabd2f;
      --ok: #b8bb26;
      --blue: #83a598;
      --line: var(--foreground2);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: var(--font-family);
      background: var(--background0);
      color: var(--foreground0);
    }

    body {
      overflow: hidden;
      font-size: 14px;
      line-height: 1.35;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-width: 0;
      height: 36px;
      background: var(--background0);
      color: var(--foreground0);
      border: 1px solid var(--line);
      padding: 6px 8px;
      outline: none;
    }

    textarea {
      height: auto;
      min-height: 120px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--foreground0);
    }

    input[type="color"] {
      width: 58px;
      min-width: 58px;
      height: 36px;
      padding: 2px;
      cursor: pointer;
    }

    button {
      appearance: none !important;
      -webkit-appearance: none !important;

      height: 16px;
      min-height: 16px;
      max-height: 16px;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 0 12px;
      margin: 0;

      cursor: pointer;
      text-transform: lowercase;
      white-space: nowrap;

      color: var(--background0);
      background: var(--foreground0);
      border: 1px solid var(--foreground0);
      line-height: 1;
      box-shadow: none !important;
      text-shadow: none !important;
    }

    button:hover {
      background: var(--foreground1);
      border-color: var(--foreground1);
    }

    button::before,
    button::after {
      content: none !important;
    }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: var(--gap);
      padding: var(--pad);
      background:
        repeating-linear-gradient(to bottom,
          color-mix(in srgb, var(--foreground0), transparent 97%) 0,
          color-mix(in srgb, var(--foreground0), transparent 97%) 1px,
          transparent 1px,
          transparent 24px),
        var(--background0);
    }

    .panel {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--background0), var(--background1) 16%);
      overflow: hidden;
    }

    .topbar {
      min-height: 74px;
      padding: 10px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
    }

    .prompt {
      color: var(--foreground1);
      white-space: nowrap;
    }

    .title {
      color: var(--foreground0);
      font-weight: 700;
      white-space: nowrap;
    }

    .cursor {
      display: inline-block;
      width: 1ch;
      color: var(--foreground0);
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    .top-actions select {
      width: 230px;
    }

    .app {
      min-height: 0;
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: var(--gap);
    }

    aside,
    main {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .section {
      margin-bottom: 20px;
    }

    .label-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--foreground1);
    }

    .label-line::before {
      content: "::";
      color: var(--foreground2);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .row+.row {
      margin-top: 8px;
    }

    .stack {
      display: grid;
      gap: 8px;
    }

    .mt {
      margin-top: 8px;
    }

    .project-item {
      height: 36px;
      display: grid;
      grid-template-columns: 2ch minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 0 8px;
      border: 1px solid var(--line);
      cursor: pointer;
      color: var(--foreground1);
      background: var(--background0);
    }

    #projectList {
      max-height: 124px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;

      scrollbar-width: thin;
      scrollbar-color: var(--foreground2) var(--background0);
    }

    #projectList::-webkit-scrollbar {
      width: 8px;
    }

    #projectList::-webkit-scrollbar-track {
      background: var(--background0);
    }

    #projectList::-webkit-scrollbar-thumb {
      background: var(--foreground2);
    }

    .project-item:hover,
    .project-item.active {
      color: var(--foreground0);
      background: var(--background1);
    }

    .project-item.active {
      border-color: var(--foreground0);
    }

    .project-item.active .project-marker {
      color: var(--ok);
    }

    .project-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-count {
      color: var(--foreground2);
    }

    .category-item {
      height: 44px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) 42px;
      gap: 8px;
      align-items: center;
      padding: 0 8px;
      border: 1px solid var(--line);
      background: var(--background0);
    }

    .color-chip {
      width: 20px;
      height: 20px;
      border: 1px solid var(--foreground0);
    }

    .color-presets {
      display: grid;
      grid-template-columns: repeat(4, 28px);
      gap: 6px;
    }

    .color-preset {
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      background: var(--preset-color);
      cursor: pointer;
    }

    .color-preset.active {
      border: 2px solid var(--foreground0);
    }

    .category-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .delete-mini {
      width: 42px !important;
      min-width: 42px !important;
      max-width: 42px !important;

      height: 28px !important;
      min-height: 28px !important;
      max-height: 28px !important;

      padding: 0 !important;
      margin: 0 !important;

      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;

      color: var(--foreground0) !important;
      background: var(--danger) !important;
      border: 1px solid var(--danger) !important;
      line-height: 1 !important;
    }

    .terminal-note {
      padding: 10px;
      color: var(--foreground1);
      border: 1px solid var(--line);
      background: var(--background0);
    }

    .terminal-note p {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .terminal-note p::before {
      content: "# ";
      color: var(--foreground2);
    }

    .board-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }

    .project-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--foreground0);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-title::before {
      content: "/project/";
      color: var(--foreground2);
      font-weight: 400;
    }

    .command-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 180px 150px auto auto;
      gap: 8px;
      margin-bottom: 12px;
    }

    .columns {
      min-width: 920px;
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 12px;
    }

    .column {
      height: calc(100vh - 255px);
      min-height: 0;

      padding: 10px;
      border: 1px solid var(--line);
      background: var(--background0);

      display: flex;
      flex-direction: column;
    }

    .column.drag-over {
      background: var(--background1);
      outline: 1px dashed var(--foreground0);
      outline-offset: -6px;
    }

    .column-title {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--foreground1);
      font-weight: 700;
    }

    .column-title span:first-child::before {
      content: "[";
      color: var(--foreground2);
    }

    .column-title span:first-child::after {
      content: "]";
      color: var(--foreground2);
    }

    .task-list {
      flex: 1 1 auto;
      min-height: 0;

      display: block;

      overflow-y: auto;
      overflow-x: hidden;

      padding-right: 4px;

      scrollbar-width: thin;
      scrollbar-color: var(--foreground2) var(--background0);
    }

    .task-card {
      --cat-color: var(--foreground2);
      --cat-border: color-mix(in srgb, var(--cat-color), var(--foreground0) 20%);
      --dither-url: none;
      --dither-width: 170px;

      position: relative;
      isolation: isolate;

      padding: 10px;
      cursor: grab;

      background: var(--background0);
      border: 1px solid var(--cat-border);
      border-left: 10px solid var(--cat-color);
      overflow: hidden;
      flex-shrink: 0;
      flex: 0 0 auto;
    }

    .task-card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;

      background-image: var(--dither-url);
      background-repeat: repeat-y;
      background-position: left top;
      background-size: var(--dither-width) auto;

      opacity: 0;
      transition: opacity 80ms steps(2, end);
      pointer-events: none;
    }

    .task-card:hover::before {
      opacity: 1;
    }

    .task-card:hover {
      background: color-mix(in srgb, var(--cat-color) 5%, var(--background0));
    }

    .task-card.dragging {
      opacity: 0.45;
    }

    .task-title {
      color: var(--foreground0);
      font-weight: 700;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .task-title::before {
      content: "- ";
      color: var(--cat-color);
    }

    .task-desc {
      color: var(--foreground1);
      white-space: pre-wrap;
      margin-bottom: 10px;
      padding-left: 8px;
      border-left: 1px solid var(--cat-color);
      overflow-wrap: anywhere;
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      display: inline-block;
      color: var(--background0);
      background: var(--cat-color);
      padding: 1px 8px;
      font-weight: 700;
    }

    .due {
      color: var(--foreground2);
    }

    .due::before {
      content: "due:";
      color: var(--foreground1);
    }

    .due.overdue {
      color: var(--danger);
      font-weight: 700;
    }

    .due-date {
      font-style: italic;
    }

    .task-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    .task-actions button {
      height: 16px !important;
      min-height: 16px !important;
      max-height: 16px !important;

      padding: 0 8px !important;
      margin: 0 !important;

      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;

      color: var(--background0) !important;
      background: var(--foreground0) !important;
      border: 1px solid var(--foreground0) !important;

      line-height: 1 !important;
      box-sizing: border-box !important;
    }

    .task-actions button.danger {
      color: var(--foreground0) !important;
      background: var(--danger) !important;
      border: 1px solid var(--danger) !important;
    }

    .empty {
      color: var(--foreground2);
      padding: 10px;
      text-align: center;
      border: 1px solid var(--line);
      background: var(--background0);
    }

    .empty::before {
      content: "<empty> ";
    }

    .dialog {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: color-mix(in srgb, var(--background0), transparent 8%);
    }

    .dialog.open {
      display: flex;
    }

    .dialog-card {
      width: min(760px, 100%);
      padding: 12px;
      border: 1px solid var(--foreground0);
      background: var(--background0);
    }

    .dialog-title {
      margin-bottom: 12px;
      color: var(--foreground0);
      font-weight: 700;
    }

    .dialog-title::before {
      content: "$ edit ";
      color: var(--foreground2);
      font-weight: 400;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .statusbar {
      min-height: 28px;
      padding: 4px 8px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      color: var(--foreground1);
    }

    .statusbar span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hidden {
      display: none;
    }

    .danger {
      color: var(--danger);
      border-color: var(--danger);
    }

    ::selection {
      background: var(--foreground0);
      color: var(--background0);
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .shell {
        height: auto;
        min-height: 100vh;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .top-actions select {
        width: 100%;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .command-row {
        grid-template-columns: 1fr;
      }

      .columns {
        min-width: 0;
        grid-template-columns: 1fr;
      }

      .column {
        min-height: 280px;
      }
    }

    .project-switch {
      width: 100%;
      height: auto;
      min-height: 0;
      max-height: none;

      padding: 0;
      margin: 0;

      display: inline-block;
      text-align: left;

      color: var(--foreground0);
      background: transparent;
      border: 0;

      font-weight: 700;
      cursor: pointer;
    }

    .project-switch:hover,
    .project-switch.switching {
      color: var(--ok);
      background: transparent;
    }

    .project-switch::before {
      content: "← /project/" !important;
      color: var(--foreground2);
      font-weight: 400;
    }

    .project-switch::after {
      content: " →" !important;
      color: var(--foreground2);
      font-weight: 400;
    }

    .project-switch.switching::after {
      content: " → input:" !important;
      color: var(--warn);
    }

    .status-flash {
      color: var(--ok);
      animation: statusFlash 650ms steps(2, end);
    }

    @keyframes statusFlash {
      0% {
        color: var(--warn);
      }

      100% {
        color: var(--ok);
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar panel">
      <div class="brand">
        <span class="prompt">compito:~$</span>
        <span class="title">personal task planner</span>
        <span class="cursor">█</span>
      </div>

      <div class="top-actions">
        <span class="prompt">theme:</span>
        <select id="themeSelect" onchange="setTheme(this.value)">
          <option value="gruvbox-dark-hard">gruvbox</option>
          <option value="nord">nord</option>
          <option value="catppuccin-mocha">catppuccin</option>
          <option value="everforest">everforest</option>
          <option value="osmium">osmium</option>
          <option value="vitesse">vitesse</option>
        </select>

        <button onclick="exportData()">export</button>
        <button onclick="document.getElementById('importFile').click()">import</button>
        <input id="importFile" class="hidden" type="file" accept="application/json" onchange="importData(event)" />

        <button class="danger" onclick="resetApp()">reset</button>
      </div>
    </header>

    <div class="app">
      <aside class="panel">
        <section class="section">
          <div class="label-line">
            <span>projects</span>
          </div>

          <div class="row">
            <input id="projectInput" placeholder="new_project" />
            <button onclick="addProject()">add</button>
          </div>

          <div id="projectList" class="stack mt"></div>
        </section>

        <section class="section">
          <div class="label-line">
            <span>categories</span>
          </div>

          <div class="row">
            <input id="categoryInput" placeholder="category" />
            <div id="categoryColorPresets" class="color-presets"></div>
            <input id="categoryColor" type="hidden" value="#b8bb26" />
          </div>

          <div class="row">
            <button style="width: 100%" onclick="addCategory()">add_category</button>
          </div>

          <div id="categoryList" class="stack mt"></div>
        </section>

        <section class="section">
          <div class="label-line">
            <span>notes</span>
          </div>

          <div class="terminal-note">
            <p>drag cards between columns</p>
            <p>autosaves to localStorage</p>
            <p>export json if it matters</p>
            <p>personal task planner</p>
          </div>
        </section>
      </aside>

      <main class="panel">
        <div class="board-header">
          <div>
            <div class="label-line">
              <span>current</span>
            </div>

            <button id="currentProjectTitle" class="project-title project-switch"
              onclick="activateProjectSwitch()"></button>
          </div>

          <button class="danger" onclick="deleteCurrentProject()">delete_project</button>
        </div>

        <div class="command-row">
          <input id="taskInput" placeholder="task title" />
          <select id="taskCategory"></select>
          <input id="taskDue" type="date" />
          <button onclick="openNewTaskDialog()">details</button>
          <button onclick="addQuickTask()">add</button>
        </div>

        <div class="columns">
          <section class="column" data-status="todo">
            <div class="column-title">
              <span>todo</span>
              <span id="todoCount">0</span>
            </div>

            <div id="todoList" class="task-list"></div>
          </section>

          <section class="column" data-status="doing">
            <div class="column-title">
              <span>doing</span>
              <span id="doingCount">0</span>
            </div>

            <div id="doingList" class="task-list"></div>
          </section>

          <section class="column" data-status="done">
            <div class="column-title">
              <span>done</span>
              <span id="doneCount">0</span>
            </div>

            <div id="doneList" class="task-list"></div>
          </section>
        </div>
      </main>
    </div>

    <footer class="statusbar panel">
      <span id="statusLeft">ready</span>
      <span id="statusRight">taskforge.local</span>
    </footer>
  </div>

  <div id="taskDialog" class="dialog">
    <div class="dialog-card">
      <div id="dialogTitle" class="dialog-title">task</div>

      <div class="label-line">
        <span>title</span>
      </div>
      <input id="dialogTaskTitle" />

      <div class="label-line mt">
        <span>description</span>
      </div>
      <textarea id="dialogTaskDescription" placeholder="notes / acceptance criteria / bugs"></textarea>

      <div class="row mt">
        <div style="flex: 1; min-width: 0">
          <div class="label-line">
            <span>category</span>
          </div>
          <select id="dialogTaskCategory"></select>
        </div>

        <div style="flex: 1; min-width: 0">
          <div class="label-line">
            <span>due</span>
          </div>
          <input id="dialogTaskDue" type="date" />
        </div>
      </div>

      <div class="dialog-actions">
        <button onclick="closeTaskDialog()">cancel</button>
        <button onclick="saveDialogTask()">save</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "taskforge_webtui_terminal_v3";

    const CATEGORY_COLORS = [
      "#b8bb26", // green
      "#fb4934", // red
      "#fabd2f", // yellow
      "#83a598", // blue
      "#d3869b", // pink
      "#8ec07c", // aqua
      "#fe8019", // orange
      "#928374"  // gray
    ];

    let projectSwitchActive = false;
    let projectNumberBuffer = "";

    function renderColorPresets() {
      const wrap = document.getElementById("categoryColorPresets");
      const input = document.getElementById("categoryColor");

      wrap.innerHTML = "";

      CATEGORY_COLORS.forEach(color => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "color-preset";
        button.style.setProperty("--preset-color", color);

        if (input.value === color) {
          button.classList.add("active");
        }

        button.onclick = () => {
          input.value = color;
          renderColorPresets();
        };

        wrap.appendChild(button);
      });
    }

    let state = loadState();
    let editingTaskId = null;

    function makeId() {
      return crypto.randomUUID
        ? crypto.randomUUID()
        : String(Date.now()) + Math.random().toString(16).slice(2);
    }

    function defaultState() {
      const projectId = makeId();
      const generalId = makeId();
      const bugId = makeId();
      const buildId = makeId();

      return {
        theme: "gruvbox-dark-hard",
        activeProjectId: projectId,
        projects: [
          {
            id: projectId,
            name: "example project",
            categories: [
              { id: generalId, name: "general", color: "#83a598" },
              { id: bugId, name: "bug", color: "#fb4934" },
              { id: buildId, name: "build", color: "#fabd2f" }
            ],
            tasks: [
              {
                id: makeId(),
                title: "this is a todo",
                description: "you can drag and drop this to other categories (e.g., [doing] or [done])",
                categoryId: generalId,
                dueDate: "",
                status: "todo",
                createdAt: Date.now()
              },
              {
                id: makeId(),
                title: "in progress example",
                description: "this task is in progress, also it has a different category (build)",
                categoryId: buildId,
                dueDate: "",
                status: "doing",
                createdAt: Date.now() + 1
              },
              {
                id: makeId(),
                title: "complete example",
                description: "this is an example of a task that is completed. congrats!",
                categoryId: bugId,
                dueDate: "",
                status: "done",
                createdAt: Date.now() + 2
              }
            ]
          }
        ]
      };
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) return defaultState();

      try {
        return migrateState(JSON.parse(saved));
      } catch {
        return defaultState();
      }
    }

    function migrateState(data) {
      if (!data || !Array.isArray(data.projects)) return defaultState();

      data.theme ??= "gruvbox-dark-hard";

      data.projects.forEach(project => {
        project.id ??= makeId();
        project.name ??= "untitled";
        project.categories ??= [
          { id: makeId(), name: "general", color: "#83a598" }
        ];
        project.tasks ??= [];

        project.categories.forEach(category => {
          category.id ??= makeId();
          category.name ??= "category";
          category.color ??= "#b8bb26";
        });

        project.tasks.forEach(task => {
          task.id ??= makeId();
          task.title ??= "untitled_task";
          task.description ??= "";
          task.dueDate ??= "";
          task.status ??= "todo";
          task.createdAt ??= Date.now();

          if (!task.categoryId && project.categories[0]) {
            task.categoryId = project.categories[0].id;
          }
        });
      });

      if (!data.activeProjectId || !data.projects.find(project => project.id === data.activeProjectId)) {
        data.activeProjectId = data.projects[0]?.id || null;
      }

      return data;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getActiveProject() {
      return state.projects.find(project => project.id === state.activeProjectId);
    }

    function getProjectCategories() {
      return getActiveProject()?.categories || [];
    }

    function getCategory(categoryId) {
      return getProjectCategories().find(category => category.id === categoryId);
    }

    function setStatus(message) {
      const left = document.getElementById("statusLeft");
      const right = document.getElementById("statusRight");

      left.textContent = message;
      right.textContent = new Date().toLocaleTimeString();

      left.classList.remove("status-flash");
      void left.offsetWidth;
      left.classList.add("status-flash");
    }

    function render() {
      saveState();
      applyTheme();
      renderProjects();
      renderCategories();
      renderCategoryOptions();
      renderColorPresets();
      renderBoard();
    }

    function applyTheme() {
      document.documentElement.setAttribute("data-webtui-theme", state.theme || "gruvbox-dark-hard");
      document.getElementById("themeSelect").value = state.theme || "gruvbox-dark-hard";
    }

    function setTheme(theme) {
      state.theme = theme;
      setStatus(`theme=${theme}`);
      render();
    }

    function renderProjects() {
      const projectList = document.getElementById("projectList");
      projectList.innerHTML = "";

      state.projects.forEach(project => {
        const item = document.createElement("div");
        item.className = "project-item";

        if (project.id === state.activeProjectId) {
          item.classList.add("active");
        }

        item.innerHTML = `
      <span class="project-marker">$</span>
      <span class="project-name">${escapeHtml(project.name)}</span>
      <span class="project-count">${project.tasks.length}</span>
    `;

        item.onclick = () => {
          state.activeProjectId = project.id;
          setStatus(`switched project: ${project.name}`);
          render();
        };

        projectList.appendChild(item);
      });
    }

    function renderCategories() {
      const categoryList = document.getElementById("categoryList");
      categoryList.innerHTML = "";

      getProjectCategories().forEach(category => {
        const item = document.createElement("div");
        item.className = "category-item";

        item.innerHTML = `
          <span class="color-chip" style="background:${category.color}"></span>
          <span class="category-name">${escapeHtml(category.name)}</span>
          <button class="delete-mini" onclick="deleteCategory('${category.id}')">x</button>
        `;

        categoryList.appendChild(item);
      });
    }

    function renderCategoryOptions() {
      fillCategorySelect(document.getElementById("taskCategory"));
      fillCategorySelect(document.getElementById("dialogTaskCategory"));
    }

    function fillCategorySelect(select) {
      select.innerHTML = "";

      getProjectCategories().forEach(category => {
        const option = document.createElement("option");
        option.value = category.id;
        option.textContent = category.name;
        select.appendChild(option);
      });
    }

    function renderBoard() {
      const project = getActiveProject();

      if (!project) return;

      renderCurrentProjectName();

      const todo = project.tasks.filter(task => task.status === "todo");
      const doing = project.tasks.filter(task => task.status === "doing");
      const done = project.tasks.filter(task => task.status === "done");

      document.getElementById("todoCount").textContent = todo.length;
      document.getElementById("doingCount").textContent = doing.length;
      document.getElementById("doneCount").textContent = done.length;

      renderColumn("todoList", todo);
      renderColumn("doingList", doing);
      renderColumn("doneList", done);
    }

    function renderColumn(elementId, tasks) {
      const list = document.getElementById(elementId);
      list.innerHTML = "";

      if (tasks.length === 0) {
        list.innerHTML = `<div class="empty">empty</div>`;
        return;
      }

      tasks
        .sort((a, b) => a.createdAt - b.createdAt)
        .forEach(task => {
          const category = getCategory(task.categoryId) || {
            name: "uncategorized",
            color: "#928374"
          };

          const card = document.createElement("article");
          card.className = "task-card";
          card.draggable = true;
          card.dataset.taskId = task.id;
          card.style.setProperty("--cat-color", category.color);
          card.style.setProperty("--dither-width", "170px");

          card.style.setProperty(
            "--dither-url",
            makeDitherGradientDataUrl(category.color, {
              pixelSize: 2,
              fadeWidth: 200,
              height: 160,
              curve: 8.0,
              opacity: 0.3
            })
          );

          card.innerHTML = `
            <div class="task-title">${escapeHtml(task.title)}</div>

            ${task.description
              ? `<div class="task-desc">${escapeHtml(task.description)}</div>`
              : ""
            }

            <div class="task-meta">
              <span class="tag">
                ${escapeHtml(category.name)}
              </span>

              ${task.dueDate
              ? `<span class="due ${isOverdue(task) ? "overdue" : ""}">
                      <span class="due-date">${escapeHtml(task.dueDate)}</span>
                    </span>`
              : `<span class="due">none</span>`
            }
            </div>

            <div class="task-actions">
              <button onclick="editTask('${task.id}')">edit</button>
              ${task.status !== "todo" ? `<button onclick="moveTask('${task.id}', 'todo')">todo</button>` : ""}
              ${task.status !== "doing" ? `<button onclick="moveTask('${task.id}', 'doing')">doing</button>` : ""}
              ${task.status !== "done" ? `<button onclick="moveTask('${task.id}', 'done')">done</button>` : ""}
              <button class="danger" onclick="deleteTask('${task.id}')">del</button>
            </div>
          `;

          card.addEventListener("dragstart", event => {
            card.classList.add("dragging");
            event.dataTransfer.setData("text/plain", task.id);
          });

          card.addEventListener("dragend", () => {
            card.classList.remove("dragging");
          });

          list.appendChild(card);
        });
    }

    function setupDragAndDrop() {
      document.querySelectorAll(".column").forEach(column => {
        column.addEventListener("dragover", event => {
          event.preventDefault();
          column.classList.add("drag-over");
        });

        column.addEventListener("dragleave", () => {
          column.classList.remove("drag-over");
        });

        column.addEventListener("drop", event => {
          event.preventDefault();

          const taskId = event.dataTransfer.getData("text/plain");
          const status = column.dataset.status;

          column.classList.remove("drag-over");
          moveTask(taskId, status);
        });
      });
    }

    function addProject() {
      const input = document.getElementById("projectInput");
      const name = input.value.trim();

      if (!name) return;

      const categoryId = makeId();

      const project = {
        id: makeId(),
        name,
        categories: [
          { id: categoryId, name: "general", color: "#83a598" }
        ],
        tasks: []
      };

      state.projects.push(project);
      state.activeProjectId = project.id;

      input.value = "";
      setStatus(`created project '${name}'`);
      render();
    }

    function deleteCurrentProject() {
      if (state.projects.length <= 1) {
        alert("need at least one project.");
        return;
      }

      const project = getActiveProject();

      if (!confirm(`delete "${project.name}"?`)) return;

      state.projects = state.projects.filter(project => project.id !== state.activeProjectId);
      state.activeProjectId = state.projects[0].id;

      setStatus(`deleted project '${project.name}'`);
      render();
    }

    function addCategory() {
      const project = getActiveProject();
      const input = document.getElementById("categoryInput");
      const colorInput = document.getElementById("categoryColor");

      const name = input.value.trim();

      if (!name || !project) return;

      project.categories.push({
        id: makeId(),
        name,
        color: colorInput.value
      });

      input.value = "";
      setStatus(`category added: '${name}'`);
      render();
    }

    function deleteCategory(categoryId) {
      const project = getActiveProject();

      if (!project || project.categories.length <= 1) {
        alert("need at least one category.");
        return;
      }

      const fallback = project.categories.find(category => category.id !== categoryId);
      const removed = project.categories.find(category => category.id === categoryId);

      project.categories = project.categories.filter(category => category.id !== categoryId);

      project.tasks.forEach(task => {
        if (task.categoryId === categoryId) {
          task.categoryId = fallback.id;
        }
      });

      setStatus(`category deleted: ${removed?.name || "unknown"}`);
      render();
    }

    function addQuickTask() {
      const project = getActiveProject();
      const titleInput = document.getElementById("taskInput");
      const categorySelect = document.getElementById("taskCategory");
      const dueInput = document.getElementById("taskDue");

      const title = titleInput.value.trim();

      if (!title || !project) return;

      project.tasks.push({
        id: makeId(),
        title,
        description: "",
        categoryId: categorySelect.value,
        dueDate: dueInput.value,
        status: "todo",
        createdAt: Date.now()
      });

      titleInput.value = "";
      dueInput.value = "";

      setStatus(`created task: "${title}"`);
      render();
    }

    function openNewTaskDialog() {
      const title = document.getElementById("taskInput").value.trim();

      editingTaskId = null;

      document.getElementById("dialogTitle").textContent = "new_task";
      document.getElementById("dialogTaskTitle").value = title;
      document.getElementById("dialogTaskDescription").value = "";
      document.getElementById("dialogTaskCategory").value = document.getElementById("taskCategory").value;
      document.getElementById("dialogTaskDue").value = document.getElementById("taskDue").value;
      document.getElementById("taskDialog").classList.add("open");
    }

    function editTask(taskId) {
      const project = getActiveProject();
      const task = project.tasks.find(task => task.id === taskId);

      if (!task) return;

      editingTaskId = taskId;

      document.getElementById("dialogTitle").textContent = "edit_task";
      document.getElementById("dialogTaskTitle").value = task.title;
      document.getElementById("dialogTaskDescription").value = task.description || "";
      document.getElementById("dialogTaskCategory").value = task.categoryId;
      document.getElementById("dialogTaskDue").value = task.dueDate || "";
      document.getElementById("taskDialog").classList.add("open");

      setStatus(`edited task:'${task.title}'`);
    }

    function closeTaskDialog() {
      editingTaskId = null;
      document.getElementById("taskDialog").classList.remove("open");
    }

    function saveDialogTask() {
      const project = getActiveProject();

      const title = document.getElementById("dialogTaskTitle").value.trim();
      const description = document.getElementById("dialogTaskDescription").value.trim();
      const categoryId = document.getElementById("dialogTaskCategory").value;
      const dueDate = document.getElementById("dialogTaskDue").value;

      if (!title || !project) return;

      if (editingTaskId) {
        const task = project.tasks.find(task => task.id === editingTaskId);

        if (task) {
          task.title = title;
          task.description = description;
          task.categoryId = categoryId;
          task.dueDate = dueDate;
        }

        setStatus(`edited task: '${title}'`);
      } else {
        project.tasks.push({
          id: makeId(),
          title,
          description,
          categoryId,
          dueDate,
          status: "todo",
          createdAt: Date.now()
        });

        document.getElementById("taskInput").value = "";
        document.getElementById("taskDue").value = "";

        setStatus(`created task: '${title}'`);
      }

      closeTaskDialog();
      render();
    }

    function moveTask(taskId, status) {
      const project = getActiveProject();
      const task = project.tasks.find(task => task.id === taskId);

      if (!task) {
        setStatus("move failed: task not found");
        return;
      }

      const oldStatus = task.status;
      task.status = status;

      if (status == `done`) {
        setStatus(`moved task: ${task.title} [${oldStatus} → ${status}] -- good job!`);
      } else {
        setStatus(`moved task: ${task.title} [${oldStatus} → ${status}]`);
      }
      render();
    }

    function deleteTask(taskId) {
      const project = getActiveProject();
      const task = project.tasks.find(task => task.id === taskId);

      project.tasks = project.tasks.filter(task => task.id !== taskId);

      setStatus(`deleted task: '${task.title}'`);
      render();
    }

    function isOverdue(task) {
      if (!task.dueDate || task.status === "done") return false;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const due = new Date(task.dueDate + "T00:00:00");

      return due < today;
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], {
        type: "application/json"
      });

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "taskforge-export.json";
      link.click();

      URL.revokeObjectURL(url);
      setStatus("export complete");
    }

    function importData(event) {
      const file = event.target.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);

          if (!imported.projects || !Array.isArray(imported.projects)) {
            alert("invalid planner file.");
            return;
          }

          state = migrateState(imported);
          setStatus("import complete");
          render();
        } catch {
          alert("could not import file.");
        }
      };

      reader.readAsText(file);
      event.target.value = "";
    }

    function resetApp() {
      if (!confirm("reset all taskforge data?")) return;

      state = defaultState();
      setStatus("reset complete");
      render();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function makeDitherGradientDataUrl(hex, options = {}) {
      const pixelSize = options.pixelSize ?? 2;      // bigger = chunkier pixels
      const fadeWidth = options.fadeWidth ?? 120;    // how far fade travels right
      const height = options.height ?? 160;          // strip height, repeats vertically
      const curve = options.curve ?? 3.0;            // higher = fades out sooner
      const opacity = options.opacity ?? 0.95;

      const rgb = hexToRgb(hex);

      const cols = Math.ceil(fadeWidth / pixelSize);
      const rows = Math.ceil(height / pixelSize);

      const matrix = [
        [0, 8, 2, 10],
        [12, 4, 14, 6],
        [3, 11, 1, 9],
        [15, 7, 13, 5]
      ];

      let rects = "";

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const t = x / Math.max(1, cols - 1);

          // left = dense, right = faded
          const fade = Math.pow(1 - t, curve);

          const threshold = (matrix[y % 4][x % 4] + 0.5) / 16;

          if (fade > threshold) {
            rects += `
          <rect
            x="${x * pixelSize}"
            y="${y * pixelSize}"
            width="${pixelSize}"
            height="${pixelSize}"
            fill="rgb(${rgb.r},${rgb.g},${rgb.b})"
            fill-opacity="${opacity}"
          />
        `;
          }
        }
      }

      const svg = `
    <svg xmlns="http://www.w3.org/2000/svg"
         width="${fadeWidth}"
         height="${height}"
         viewBox="0 0 ${fadeWidth} ${height}"
         shape-rendering="crispEdges">
      ${rects}
    </svg>
  `;

      return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
    }

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");

      return {
        r: parseInt(clean.slice(0, 2), 16),
        g: parseInt(clean.slice(2, 4), 16),
        b: parseInt(clean.slice(4, 6), 16)
      };
    }

    function cssColorToRgb(color) {
      const div = document.createElement("div");
      div.style.color = color;
      document.body.appendChild(div);

      const computed = getComputedStyle(div).color;
      div.remove();

      const match = computed.match(/\d+/g);

      if (!match) return null;

      return {
        r: Number(match[0]),
        g: Number(match[1]),
        b: Number(match[2])
      };
    }

    function renderCurrentProjectName() {
      const project = getActiveProject();
      const button = document.getElementById("currentProjectTitle");

      if (!project || !button) return;

      const index = state.projects.findIndex(p => p.id === project.id) + 1;
      const total = state.projects.length;

      const bufferText = projectSwitchActive && projectNumberBuffer
        ? ` [${projectNumberBuffer}]`
        : "";

      button.textContent = `${project.name} (${index}/${total})${bufferText}`;

      button.classList.toggle("switching", projectSwitchActive);
    }

    function activateProjectSwitch() {
      projectSwitchActive = true;
      projectNumberBuffer = "";
      setStatus("project switch: arrows or type number, enter to jump, esc to cancel");
      renderCurrentProjectName();
    }

    function deactivateProjectSwitch() {
      projectSwitchActive = false;
      projectNumberBuffer = "";
      renderCurrentProjectName();
    }

    function switchProjectByOffset(offset) {
      const currentIndex = state.projects.findIndex(project => project.id === state.activeProjectId);
      const nextIndex = (currentIndex + offset + state.projects.length) % state.projects.length;

      state.activeProjectId = state.projects[nextIndex].id;

      setStatus(`switched project: ${state.projects[nextIndex].name}`);
      projectNumberBuffer = "";
      render();
    }

    function switchProjectByNumber(numberString) {
      const projectNumber = Number(numberString);

      if (!Number.isInteger(projectNumber)) return;

      const index = projectNumber - 1;

      if (index < 0 || index >= state.projects.length) {
        setStatus(`no project #${projectNumber}`);
        projectNumberBuffer = "";
        renderCurrentProjectName();
        return;
      }

      state.activeProjectId = state.projects[index].id;
      setStatus(`switched project: ${state.projects[index].name}`);

      deactivateProjectSwitch();
      render();
    }

    document.addEventListener("keydown", event => {
      if (!projectSwitchActive) return;

      if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
        event.preventDefault();
        switchProjectByOffset(-1);
        return;
      }

      if (event.key === "ArrowRight" || event.key === "ArrowDown") {
        event.preventDefault();
        switchProjectByOffset(1);
        return;
      }

      if (event.key === "Escape") {
        event.preventDefault();
        deactivateProjectSwitch();
        setStatus("project switch cancelled");
        return;
      }

      if (/^\d$/.test(event.key)) {
        event.preventDefault();

        projectNumberBuffer += event.key;
        renderCurrentProjectName();
        return;
      }

      if (event.key === "Backspace") {
        event.preventDefault();

        projectNumberBuffer = projectNumberBuffer.slice(0, -1);
        renderCurrentProjectName();
        return;
      }

      if (event.key === "Enter") {
        event.preventDefault();

        if (projectNumberBuffer) {
          switchProjectByNumber(projectNumberBuffer);
          return;
        }

        deactivateProjectSwitch();
      }
    });

    document.getElementById("projectInput").addEventListener("keydown", event => {
      if (event.key === "Enter") addProject();
    });

    document.getElementById("categoryInput").addEventListener("keydown", event => {
      if (event.key === "Enter") addCategory();
    });

    document.getElementById("taskInput").addEventListener("keydown", event => {
      if (event.key === "Enter") addQuickTask();
    });

    document.getElementById("taskDialog").addEventListener("click", event => {
      if (event.target.id === "taskDialog") closeTaskDialog();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeTaskDialog();
    });

    setupDragAndDrop();
    render();
    setStatus("ready");
  </script>
</body>

</html>
